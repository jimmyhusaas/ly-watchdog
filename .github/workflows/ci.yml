name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + type-check + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: watchdog
          POSTGRES_PASSWORD: watchdog_dev
          POSTGRES_DB: ly_watchdog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchdog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://watchdog:watchdog_dev@localhost:5432/ly_watchdog
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.1"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv & install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy app scrapers

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: pytest
        run: uv run pytest --cov=app --cov-report=term-missing

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ly-watchdog:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
