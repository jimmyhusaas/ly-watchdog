services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchdog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchdog_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ly_watchdog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchdog} -d ${POSTGRES_DB:-ly_watchdog}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-watchdog}:${POSTGRES_PASSWORD:-watchdog_dev}@postgres:5432/${POSTGRES_DB:-ly_watchdog}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-watchdog}:${POSTGRES_PASSWORD:-watchdog_dev}@postgres:5432/${POSTGRES_DB:-ly_watchdog}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
